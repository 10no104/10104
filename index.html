<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>레시피 확인함</title>
    <meta name="description" content="Google Sheets를 데이터베이스로 사용하는 모바일 친화적인 레시피 확인 페이지" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Recipe DB</p>
          <h1>레시피 확인함</h1>
        </div>
        <button class="icon-button" id="refreshButton" type="button" aria-label="새로고침" title="새로고침">↻</button>
      </header>

      <section class="search-area" aria-label="레시피 검색">
        <label>
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="레시피 제목 검색" autocomplete="off" />
        </label>
        <p class="status" id="statusText">시트에서 레시피를 불러오는 중...</p>
      </section>

      <section class="mobile-stage" id="mobileStage">
        <section class="list-view" id="listView" aria-label="레시피 목록">
          <div class="recipe-list" id="recipeList"></div>
        </section>

        <section class="detail-view" id="detailView" aria-label="상세 레시피">
          <button class="back-button" id="backButton" type="button">← 목록</button>

          <article class="recipe-detail">
            <div class="detail-heading">
              <p class="eyebrow" id="detailCategory">Recipe</p>
              <h2 id="detailTitle">레시피를 선택해주세요</h2>
              <p id="detailNote"></p>
            </div>

            <div class="meta-grid">
              <div>
                <span id="detailTime">-</span>
                <small>시간</small>
              </div>
              <div>
                <span id="detailServings">-</span>
                <small>분량</small>
              </div>
            </div>

            <div class="detail-sections">
              <section class="recipe-block">
                <h3>재료</h3>
                <ul id="ingredientList"></ul>
              </section>

              <section class="recipe-block">
                <h3>만드는 법</h3>
                <ol id="stepList"></ol>
              </section>
            </div>
          </article>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
