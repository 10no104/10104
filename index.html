<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>레시피 확인함</title>
    <meta name="description" content="Google Sheets를 데이터베이스처럼 사용하는 레시피 확인 페이지" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Recipe DB</p>
          <h1>레시피 확인함</h1>
          <p>시트에 모아둔 레시피를 제목으로 빠르게 찾고, 필요한 것만 눌러 상세를 확인하세요.</p>
        </div>
        <button class="refresh-button" id="refreshButton" type="button" aria-label="새로고침" title="새로고침">
          <span aria-hidden="true">↻</span>
        </button>
      </header>

      <section class="toolbar" aria-label="레시피 검색">
        <label>
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="Pizza, 식빵, Cookies..." autocomplete="off" />
        </label>
        <div class="status-card">
          <strong id="recipeCount">0</strong>
          <span id="statusText">시트에서 레시피를 불러오는 중...</span>
        </div>
      </section>

      <section class="recipe-stage" id="recipeStage">
        <section class="list-view" aria-label="레시피 제목 목록">
          <div class="list-heading">
            <p class="eyebrow">Titles</p>
            <h2>레시피 목록</h2>
          </div>
          <div class="recipe-list" id="recipeList"></div>
        </section>

        <section class="detail-view" aria-label="상세 레시피">
          <button class="back-button" id="backButton" type="button">← 목록</button>

          <article class="detail-empty" id="emptyDetail">
            <p class="eyebrow">Select</p>
            <h2>제목을 누르면 상세 레시피가 열려요</h2>
            <p>처음 화면은 제목만 보여주고, 선택한 레시피의 재료와 정보만 펼쳐집니다.</p>
          </article>

          <article class="recipe-detail" id="recipeDetail" hidden>
            <div class="detail-heading">
              <p class="eyebrow" id="detailCategory">Recipe</p>
              <h2 id="detailTitle"></h2>
              <p id="detailNote"></p>
            </div>

            <div class="meta-grid">
              <div>
                <span id="detailTime">-</span>
                <small>시간</small>
              </div>
              <div>
                <span id="detailServings">-</span>
                <small>분량</small>
              </div>
            </div>

            <div class="detail-sections">
              <section class="recipe-block">
                <h3>재료</h3>
                <ul id="ingredientList"></ul>
              </section>

              <section class="recipe-block">
                <h3>만드는 법 / 정보</h3>
                <ol id="stepList"></ol>
              </section>
            </div>
          </article>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
