<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>레시피 보관함</title>
    <meta
      name="description"
      content="레시피를 저장하고 재료와 조리 단계를 확인하며 요리할 수 있는 개인용 레시피 페이지"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="레시피 보관함">
        <aside class="sidebar">
          <div class="brand-block">
            <p class="kicker">Kitchen Notes</p>
            <h1>레시피 보관함</h1>
            <p>자주 만드는 메뉴를 저장하고, 요리할 때 재료와 순서를 하나씩 확인하세요.</p>
          </div>

          <div class="controls">
            <label class="search-box">
              <span>검색</span>
              <input id="searchInput" type="search" placeholder="김치, 파스타, 간식..." />
            </label>

            <div class="filter-row" aria-label="카테고리 필터">
              <button class="chip active" type="button" data-filter="all">전체</button>
              <button class="chip" type="button" data-filter="한식">한식</button>
              <button class="chip" type="button" data-filter="양식">양식</button>
              <button class="chip" type="button" data-filter="간식">간식</button>
            </div>
          </div>

          <div class="recipe-list" id="recipeList" aria-label="저장된 레시피 목록"></div>
        </aside>

        <section class="detail-panel">
          <div class="detail-hero" id="detailHero">
            <div>
              <p class="kicker" id="selectedCategory">한식</p>
              <h2 id="selectedTitle">김치볶음밥</h2>
              <p id="selectedNote">냉장고 재료로 빠르게 만드는 든든한 한 끼.</p>
            </div>
            <div class="stat-grid" aria-label="레시피 요약">
              <div>
                <span id="selectedTime">15분</span>
                <small>소요 시간</small>
              </div>
              <div>
                <span id="selectedServings">1인분</span>
                <small>분량</small>
              </div>
            </div>
          </div>

          <div class="tabs" role="tablist" aria-label="상세 보기">
            <button class="tab active" type="button" data-tab="check">확인하기</button>
            <button class="tab" type="button" data-tab="form">레시피 추가</button>
          </div>

          <section class="tab-panel active" id="checkPanel">
            <div class="section-heading">
              <div>
                <p class="kicker">Check Mode</p>
                <h3>재료와 순서 체크</h3>
              </div>
              <button class="secondary-button" id="resetChecks" type="button">체크 초기화</button>
            </div>

            <div class="check-grid">
              <article class="panel-block">
                <h4>재료</h4>
                <div id="ingredientChecklist" class="checklist"></div>
              </article>

              <article class="panel-block">
                <h4>조리 순서</h4>
                <div id="stepChecklist" class="checklist ordered"></div>
              </article>
            </div>
          </section>

          <section class="tab-panel" id="formPanel">
            <form id="recipeForm" class="recipe-form">
              <div class="section-heading compact">
                <div>
                  <p class="kicker">Archive</p>
                  <h3 id="formTitle">레시피 수정</h3>
                </div>
                <button class="secondary-button" id="newRecipe" type="button">새 레시피</button>
              </div>

              <div class="form-grid">
                <label>
                  레시피 이름
                  <input id="titleInput" required maxlength="40" placeholder="예: 토마토 달걀볶음" />
                </label>
                <label>
                  카테고리
                  <select id="categoryInput">
                    <option>한식</option>
                    <option>양식</option>
                    <option>간식</option>
                    <option>기타</option>
                  </select>
                </label>
                <label>
                  소요 시간
                  <input id="timeInput" required maxlength="12" placeholder="예: 20분" />
                </label>
                <label>
                  분량
                  <input id="servingsInput" required maxlength="12" placeholder="예: 2인분" />
                </label>
              </div>

              <label>
                한 줄 메모
                <input id="noteInput" required maxlength="80" placeholder="맛이나 보관 팁을 짧게 적어주세요" />
              </label>

              <label>
                재료
                <textarea
                  id="ingredientsInput"
                  required
                  rows="5"
                  placeholder="한 줄에 하나씩 입력&#10;밥 1공기&#10;김치 1/2컵"
                ></textarea>
              </label>

              <label>
                조리 순서
                <textarea
                  id="stepsInput"
                  required
                  rows="6"
                  placeholder="한 줄에 하나씩 입력&#10;팬에 기름을 두른다&#10;김치를 볶고 밥을 넣는다"
                ></textarea>
              </label>

              <div class="form-actions">
                <button class="primary-button" type="submit">저장하기</button>
                <button class="secondary-button danger" id="deleteRecipe" type="button">선택 삭제</button>
              </div>
            </form>
          </section>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
